<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Aggiungi Calciatore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
    body {
        
        background-color: #1a1a1a; 
        
        background-image: 
            linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
            url('/images/coach1.jpg');
        
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
        
        min-height: 100vh;
        font-family: 'Inter', sans-serif;
    }

    .card { 
        border-radius: 15px; 
        border: none !important; 
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4) !important;
        overflow: hidden;
    }

    .card-header { 
        background-color: #0d6efd !important; 
        padding: 1.2rem; 
        font-family: 'Oswald', sans-serif !important;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: white;
    }

    .card-header h3 {
        margin-bottom: 0;
        font-weight: 700;
    }

    .form-label { 
        font-weight: 600; 
        color: #495057; 
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    
    .form-control:focus, .form-select:focus {
        border-color: #198754; 
        box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.15);
    }

   
    .btn-success {
        font-family: 'Oswald', sans-serif !important;
        text-transform: uppercase;
        padding: 0.8rem;
        font-size: 1.1rem;
        letter-spacing: 1px;
    }
</style>
</head>
<body>
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <h3 class="mb-0 "> Pupillo</h3>
                </div>
                <div class="card-body p-4">
                    <div th:if="${#fields.hasErrors('calciatore.codice')}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
                         <strong><i class="bi bi-exclamation-triangle-fill"></i> Attenzione! Codice già in uso</strong> 
                         <span th:errors="${calciatore.codice}">Messaggio di errore</span>
                         <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                    <form th:action="@{/new}" th:object="${calciatore}" method="post">
                        
<div class="mb-3">
    <label class="form-label">Codice Identificativo</label>
    
    <input type="text" th:field="*{codice}" 
           class="form-control" 
           th:classappend="${#fields.hasErrors('codice')} ? 'is-invalid' : ''" 
           th:readonly="${calciatore.codice != null && calciatore.codice != ''}"
           placeholder="Es: BRE3" required>
    
    <input type="hidden" name="isEdit" th:value="${calciatore.codice != null && calciatore.codice != ''}">

    <div class="invalid-feedback" th:if="${#fields.hasErrors('codice')}" th:errors="*{codice}">
        Errore codice
    </div>
</div>
                        <div class="mb-3">
                            <label class="form-label">Nome Completo</label>
                            <input type="text" th:field="*{nome}" class="form-control" placeholder="Es: Gleison Bremer" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Squadra</label>
                            <input type="text" th:field="*{squadra}" class="form-control" placeholder="Es: Juve" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Ruolo</label>
                            <select th:field="*{ruolo}" class="form-select" required>
                                <option value="" selected disabled>Seleziona ruolo</option>
                                <option value="Portiere">Portiere</option>
                                <option value="Difensore">Difensore</option>
                                <option value="Centrocampista">Centrocampista</option>
                                <option value="Attaccante">Attaccante</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Quotazione (FantaMilioni)</label>
                            <div class="input-group">
                                <input type="number" th:field="*{quotazione}" class="form-control" min="1" max="500" required>
                                <span class="input-group-text">FM</span>
                            </div>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-success btn-lg shadow-sm">Registra pupillo</button>
                            <a th:href="@{/}" class="btn btn-outline-secondary">Annulla</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
