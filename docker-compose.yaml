version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: fanta-db
    environment:
      MYSQL_ROOT_PASSWORD: fanta
      MYSQL_DATABASE: fanta_db
    ports:
      - "3308:3306" # Mappiamo la 3306 interna del container sulla tua 3308 del PC
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - fanta-network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fanta-app
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
    
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: fanta_db
      DB_USER: root
      DB_PASSWORD: fanta
    networks:
      - fanta-network

volumes:
  db_data:

networks:
  fanta-network:
    driver: bridge