<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FantaCatalogo - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
   
                background-color: #1a1a1a; 
                
                background-image: 
                    linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
                    url('/images/stadio.jpg');
                
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
                background-repeat: no-repeat;
                
                min-height: 100vh;
                font-family: 'Inter', sans-serif;
            }


            h2, .card-header h2, thead th {
                font-family: 'Oswald', sans-serif !important;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .card {
                border: none;
                border-radius: 15px;
                overflow: hidden;
                box-shadow: 0 20px 40px rgba(0,0,0,0.4) !important;
            }

        
            .table-hover tbody tr:hover {
                background-color: rgba(13, 110, 253, 0.05);
                transform: scale(1.01);
                transition: all 0.2s ease-in-out;
                box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            }

            .code-link {
                text-decoration: none;
                color: #0d6efd;
                font-weight: bold;
            }

            .code-link:hover {
                text-decoration: underline;
            }

            .badge-ruolo {
                min-width: 125px;
                padding: 0.6rem;
                font-weight: 600;
                border-radius: 8px;
            }

            .search-container {
                background: white;
                padding: 1rem;
                border-radius: 10px;
                border: 1px solid #dee2e6;
            }
</style>

</head>
<body>

<div class=" container mt-5 mb-5">
    <div class="card shadow-lg">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h2 class="mb-0">FantaCatalogo</h2>
            <div>
                <a th:href="@{/new}" class="btn btn-success shadow-sm me-2">Aggiungi Pupillo</a>
                <a th:href="@{/clear}" class="btn btn-danger shadow-sm" onclick="return confirm('Sei sicuro di voler svuotare tutto?')">Svuota</a>
            </div>
        </div>
        
        <div class="card-body p-4">
            <div th:if="${eliminato}" class="alert alert-warning alert-dismissible fade show">
                <span th:text="${eliminato}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <form th:action="@{/}" method="get" class="mb-4 d-flex bg-white p-3 rounded shadow-sm border">
                <input type="text" name="search" class="form-control me-2" placeholder="Cerca calciatore per nome..." th:value="${param.search}">
                <button type="submit" class="btn btn-primary px-4">🔎</button>
                <a th:href="@{/}" class="btn btn-outline-secondary ms-2">🔃</a>
            </form>

            <div th:if="${not #lists.isEmpty(calciatori)}">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Codice</th>
                            <th>Nome</th>
                            <th>Squadra</th>
                            <th class="text-center">Ruolo</th>
                            <th class="text-center">Quotazione</th>
                            <th class="text-end px-4">Azioni</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${calciatori}">
                            <td>
                                <a th:href="@{'/item/' + ${c.codice}}" class="code-link" th:text="${c.codice}"></a>
                            </td>
                            <td><strong th:text="${c.nome}"></strong></td>
                            <td th:text="${c.squadra}"></td>
                            <td class="text-center">
                                <span th:if="${c.ruolo == 'Portiere'}" class="badge bg-warning text-dark badge-ruolo">Portiere</span>
                                <span th:if="${c.ruolo == 'Difensore'}" class="badge bg-success badge-ruolo">Difensore</span>
                                <span th:if="${c.ruolo == 'Centrocampista'}" class="badge bg-primary badge-ruolo">Centrocampista</span>
                                <span th:if="${c.ruolo == 'Attaccante'}" class="badge bg-danger badge-ruolo">Attaccante</span>
                            </td>
                            <td class ="text-center">
                                <span class="badge rounded-pill bg-light text-dark border shadow-sm">
                                    <span th:text="${c.quotazione}"></span> FM
                                </span>
                            </td>
                            <td class="text-end">
                                <a th:href="@{'/edit/' + ${c.codice}}" 
                                   class="btn btn-sm btn-outline-primary shadow-sm">Modifica</a>
                                <a th:href="@{'/delete/' + ${c.codice}}" 
                                   class="btn btn-sm btn-outline-danger shadow-sm"
                                   onclick="return confirm('Confermi di voler eliminare questo elemento?')">Elimina</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${#lists.isEmpty(calciatori)}" class="text-center py-5">
                <h4 class="text-muted">Il catalogo è attualmente vuoto.</h4>
                <p>Usa il tasto "Aggiungi Pupillo" per popolare la tua rosa.</p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    setTimeout(function() {
        let alerts = document.querySelectorAll('.alert');
        alerts.forEach(function(alert) {
            let bsAlert = new bootstrap.Alert(alert);
            bsAlert.close();
        });
    }, 5000); 
</script>
</body>
</html>
